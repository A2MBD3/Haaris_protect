services:
  - type: web
    name: haaris-bot
    runtime: node
    region: singapore
    plan: free
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm --filter @workspace/db run push && pnpm --filter @workspace/api-server run build
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: haaris-db
          property: connectionString

databases:
  - name: haaris-db
    region: singapore
    plan: free
    databaseName: haaris
    user: haaris
